name: Reusable Deploy
on:
  workflow_call:
    inputs:
      artifact-name:
        description: "The name of the deployable artifact file"
        required: true
        default: dist
        type: string
    outputs:
      result:
        description: "The result of the deployment"
        value: ${{jobs.deploy.outputs.outcomes}}
    # secrets:
    # some-secret:
    #   description: "A secret required for deployment"
    #   required: false
jobs:
  deploy:
    outputs:
      outcomes: ${{ steps.set-result.outputs.step-result }}
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
      - name: List files
        run: ls
      - name: Output Information
        run: echo "Deploying & uploading..."
      - name: Set result output
        id: set-result
        run: echo "step-result=success" >> $GITHUB_OUTPUT
